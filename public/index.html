<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Data Coffee 暂停服务通知</title>
    <style>
      :root {
        --bg: #f7f7f2;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
        background: radial-gradient(circle at top right, #dff4f1 0%, var(--bg) 50%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(760px, 100%);
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(15, 118, 110, 0.12);
        padding: 40px 28px;
      }

      .badge {
        display: inline-block;
        background: #d1fae5;
        color: var(--accent);
        font-weight: 700;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 999px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 4vw, 36px);
        line-height: 1.2;
      }

      p {
        margin: 12px 0 0;
        line-height: 1.7;
        color: var(--muted);
        font-size: 16px;
      }

      .footer {
        margin-top: 24px;
        font-size: 14px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Service Paused</div>
      <h1>Data Coffee 服务暂时关闭</h1>
      <p>
        由于当前运行成本较高，我们已暂时停止在线服务，正在进行优化与重整。
      </p>
      <p>
        感谢你的理解与耐心等待。我们会在准备就绪后尽快重新开放，并在社区第一时间通知。
      </p>
      <p class="footer">Data Coffee Team</p>
    </main>
  </body>
</html>
